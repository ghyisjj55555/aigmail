<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業系統登入 - CorpMail AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md" x-data="loginForm()" x-cloak>
        <div class="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl p-8 md:p-10">
            
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl shadow-lg mb-4 text-white">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">CorpMail AI</h1>
                <p class="text-gray-500 mt-2 text-sm">請登入您的企業帳號以繼續</p>
            </div>

            <form @submit.prevent="handleLogin" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Gmail 帳號</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-gray-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </span>
                        <input 
                            type="email" 
                            x-model="email"
                            required
                            placeholder="username@gmail.com"
                            class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 pl-12 pr-4 focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all"
                        >
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">密碼</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-gray-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </span>
                        <input 
                            :type="showPassword ? 'text' : 'password'" 
                            x-model="password"
                            required
                            placeholder="••••••••"
                            class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 pl-12 pr-12 focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all"
                        >
                        <button type="button" @click="showPassword = !showPassword" class="absolute right-4 top-3.5 text-gray-400 hover:text-indigo-600">
                            <svg x-show="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                            <svg x-show="showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"></path></svg>
                        </button>
                    </div>
                </div>

                <div x-show="errorMessage" x-transition class="bg-red-50 text-red-600 text-xs p-3 rounded-lg flex items-center space-x-2">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                    <span x-text="errorMessage"></span>
                </div>

                <button 
                    type="submit" 
                    :disabled="isLoading"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-indigo-200 transition-all flex items-center justify-center space-x-2 disabled:opacity-70"
                >
                    <template x-if="!isLoading">
                        <span>立即登入</span>
                    </template>
                    <template x-if="isLoading">
                        <div class="flex items-center">
                            <svg class="animate-spin h-5 w-5 text-white mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                            <span>驗證中...</span>
                        </div>
                    </template>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <a href="#" class="text-sm text-indigo-600 hover:underline">忘記密碼？</a>
                <span class="mx-2 text-gray-300">|</span>
                <a href="#" class="text-sm text-gray-500 hover:text-gray-700">申請企業帳號</a>
            </div>
        </div>

        <p class="text-center text-indigo-100/70 text-xs mt-8 uppercase tracking-widest font-medium">
            &copy; 2026 CorpMail AI Security System
        </p>
    </div>

    <script>
        function loginForm() {
            return {
                email: '',
                password: '',
                showPassword: false,
                isLoading: false,
                errorMessage: '',

                handleLogin() {
                    this.isLoading = true;
                    this.errorMessage = '';

                    // 模擬 API 驗證延遲
                    setTimeout(() => {
                        // 這裡設定一個簡單的模擬邏輯
                        // 假設只要帳號包含 "gmail.com" 且密碼不為空就通過
                        if (this.email.includes('gmail.com')) {
                            alert('登入成功！正在導向您的企業收件匣...');
                            window.location.href = 'terms.html';
                            this.isLoading = false;
                        } else {
                            this.errorMessage = '無效的帳號格式，請使用 Gmail 企業帳號。';
                            this.isLoading = false;
                        }
                    }, 1500);
                }
            }
        }
    </script>
</body>
</html>
